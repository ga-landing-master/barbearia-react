name: Deploy to Hostinger (SSH Key)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean up files
        run: |
          rm -rf .git .github .DS_Store
          echo "Files to deploy:"
          ls -la

      - name: Clean remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /home/${{ secrets.USER }}/domains/${{ vars.DOMAIN }}/public_html
            rm -rf *
            echo "Remote directory cleaned"

      - name: Copy files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          source: "./*"
          target: "/home/${{ secrets.USER }}/domains/${{ vars.DOMAIN }}/public_html"
          strip_components: 0
          overwrite: true
          debug: true